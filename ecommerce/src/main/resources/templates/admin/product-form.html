<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${product.id != null} ? 'Edit Product' : 'Add Product'">Product Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f1f5f9; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold" th:href="@{/admin}">
            <i class="bi bi-speedometer2 me-1"></i>Admin
        </a>
        <a th:href="@{/admin}" class="btn btn-sm btn-outline-light">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>
</nav>

<div class="container py-3" style="max-width: 680px;">
    <h4 class="fw-bold mb-4" th:text="${product.id != null} ? 'Edit Product' : 'Add New Product'">Form</h4>

    <div class="card p-4">
        <form th:action="@{/admin/products/save}" th:object="${product}"
              method="post" enctype="multipart/form-data" novalidate>
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{imageUrl}"/>
            <input type="hidden" th:field="*{available}"/>

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Product Name *</label>
                    <input type="text" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           class="form-control" placeholder="e.g. Wireless Headphones"/>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Description *</label>
                    <textarea th:field="*{description}" rows="3" class="form-control"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              placeholder="Describe the product..."></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Price (₹) *</label>
                    <input type="number" th:field="*{price}" step="0.01" min="0"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                           class="form-control" placeholder="0.00"/>
                    <div class="invalid-feedback" th:errors="*{price}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Stock *</label>
                    <input type="number" th:field="*{stock}" min="0"
                           th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"
                           class="form-control" placeholder="0"/>
                    <div class="invalid-feedback" th:errors="*{stock}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Category *</label>
                    <input type="text" th:field="*{category}"
                           th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                           class="form-control" placeholder="e.g. Electronics, Clothing"/>
                    <div class="invalid-feedback" th:errors="*{category}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Product Image</label>
                    <input type="file" name="imageFile" class="form-control" accept="image/*"/>
                    <small class="text-muted">Leave empty to keep existing image</small>
                    <div th:if="${product.imageUrl}" class="mt-2">
                        <img th:src="${product.imageUrl}" style="height:80px; border-radius:6px;" alt="Current"/>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-warning fw-bold px-4">
                    <i class="bi bi-save me-1"></i>Save Product
                </button>
                <a th:href="@{/admin}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
