<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Dashboard - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f1f5f9; }
        .sidebar { background: #1e293b; min-height: 100vh; }
        .sidebar .nav-link { color: #94a3b8; border-radius: 8px; margin-bottom: 2px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #334155; color: #fff; }
        .stat-card { border: none; border-radius: 12px; }
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
        .status-PENDING   { background: #fef3c7; color: #92400e; }
        .status-CONFIRMED { background: #dbeafe; color: #1e40af; }
        .status-SHIPPED   { background: #ede9fe; color: #5b21b6; }
        .status-DELIVERED { background: #d1fae5; color: #065f46; }
        .status-CANCELLED { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar p-3" style="width: 220px; min-width: 220px;">
        <div class="text-warning fw-bold fs-5 mb-4 ps-2">
            <i class="bi bi-bag-heart-fill me-2"></i>ShopEase
        </div>
        <nav class="nav flex-column gap-1">
            <a href="#products" class="nav-link active" data-bs-toggle="pill">
                <i class="bi bi-box-seam me-2"></i>Products
            </a>
            <a href="#orders" class="nav-link" data-bs-toggle="pill">
                <i class="bi bi-receipt me-2"></i>Orders
            </a>
            <hr class="border-secondary"/>
            <a th:href="@{/products}" class="nav-link">
                <i class="bi bi-storefront me-2"></i>View Store
            </a>
            <form th:action="@{/logout}" method="post" class="mt-2">
                <button class="btn btn-sm btn-outline-secondary w-100 text-start">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
            </form>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0">Admin Dashboard</h3>
            <a th:href="@{/admin/products/new}" class="btn btn-warning fw-bold">
                <i class="bi bi-plus-circle me-1"></i>Add Product
            </a>
        </div>

        <!-- Flash -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-lg-3">
                <div class="card stat-card shadow-sm p-3 border-start border-warning border-4">
                    <div class="text-muted small">Total Products</div>
                    <div class="fw-bold fs-3" th:text="${products.size()}">0</div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card stat-card shadow-sm p-3 border-start border-info border-4">
                    <div class="text-muted small">Total Orders</div>
                    <div class="fw-bold fs-3" th:text="${orders.size()}">0</div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card stat-card shadow-sm p-3 border-start border-success border-4">
                    <div class="text-muted small">Revenue</div>
                    <div class="fw-bold fs-3">
                        ₹<span th:text="${#numbers.formatDecimal(orders.stream().mapToDouble(o -> o.totalAmount).sum(), 1, 0)}">0</span>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-lg-3">
                <div class="card stat-card shadow-sm p-3 border-start border-danger border-4">
                    <div class="text-muted small">Pending Orders</div>
                    <div class="fw-bold fs-3"
                         th:text="${orders.stream().filter(o -> o.status == 'PENDING').count()}">0</div>
                </div>
            </div>
        </div>

        <!-- Tab Pills -->
        <div class="tab-content">
            <!-- Products Table -->
            <div class="tab-pane fade show active" id="products">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-header bg-white fw-bold py-3">
                        <i class="bi bi-box-seam me-2 text-warning"></i>Products
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th><th>Product</th><th>Category</th>
                                <th>Price</th><th>Stock</th><th>Status</th><th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${products}">
                                <td th:text="${p.id}"></td>
                                <td class="fw-semibold" th:text="${p.name}"></td>
                                <td><span class="badge bg-secondary" th:text="${p.category}"></span></td>
                                <td th:text="'₹' + ${#numbers.formatDecimal(p.price, 1, 2)}"></td>
                                <td th:text="${p.stock}"></td>
                                <td>
                                    <span class="badge" th:classappend="${p.available} ? 'bg-success' : 'bg-danger'"
                                          th:text="${p.available} ? 'Active' : 'Hidden'"></span>
                                </td>
                                <td class="d-flex gap-1">
                                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post"
                                          onsubmit="return confirm('Remove this product?')">
                                        <button class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Orders Table (shown via JS tab) -->
            <div class="tab-pane fade" id="orders">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-header bg-white fw-bold py-3">
                        <i class="bi bi-receipt me-2 text-info"></i>Orders
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th><th>Customer</th><th>Date</th>
                                <th>Total</th><th>Status</th><th>Update</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o : ${orders}">
                                <td th:text="${o.id}"></td>
                                <td th:text="${o.user.name}"></td>
                                <td th:text="${#temporals.format(o.orderDate, 'dd MMM yyyy')}"></td>
                                <td th:text="'₹' + ${#numbers.formatDecimal(o.totalAmount, 1, 2)}"></td>
                                <td>
                                    <span class="status-badge" th:classappend="'status-' + ${o.status}"
                                          th:text="${o.status}"></span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/orders/{id}/status(id=${o.id})}" method="post" class="d-flex gap-1">
                                        <select name="status" class="form-select form-select-sm" style="width:130px;">
                                            <option th:each="s : ${ {'PENDING','CONFIRMED','SHIPPED','DELIVERED','CANCELLED'} }"
                                                    th:value="${s}" th:text="${s}"
                                                    th:selected="${s == o.status}"></option>
                                        </select>
                                        <button class="btn btn-sm btn-outline-success">
                                            <i class="bi bi-check"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Activate tab from URL hash
    const hash = window.location.hash;
    if (hash) {
        const tab = document.querySelector(`a[href="${hash}"]`);
        if (tab) new bootstrap.Tab(tab).show();
    }
    document.querySelectorAll('[data-bs-toggle="pill"]').forEach(el => {
        el.addEventListener('click', e => {
            e.preventDefault();
            new bootstrap.Tab(el).show();
            history.pushState(null, '', el.getAttribute('href'));
        });
    });
</script>
</body>
</html>
