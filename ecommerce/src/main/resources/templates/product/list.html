<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Products - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; border: none; border-radius: 12px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        .product-card img { height: 220px; object-fit: cover; width: 100%; }
        .badge-cart { position: relative; top: -8px; right: 4px; font-size: 0.65rem; }
        footer { background: #212529; color: #adb5bd; }
        .category-badge { cursor: pointer; }
        .price-tag { font-size: 1.3rem; font-weight: 700; color: #f59e0b; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/products}"><i class="bi bi-grid me-1"></i>Products</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}"><i class="bi bi-speedometer2 me-1"></i>Admin</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="badge bg-warning text-dark badge-cart" th:text="${cartCount} ?: '0'">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/orders}"><i class="bi bi-box-seam me-1"></i>My Orders</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-light ms-2">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm btn-outline-light me-2" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm btn-warning" th:href="@{/register}">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Hero Search -->
    <div class="bg-dark text-white rounded-3 p-4 mb-4">
        <h2 class="fw-bold mb-1">🛒 Discover Products</h2>
        <p class="text-white-50 mb-3">Find exactly what you're looking for</p>
        <form th:action="@{/products}" method="get">
            <div class="input-group">
                <input type="text" name="search" class="form-control form-control-lg"
                       placeholder="Search products..." th:value="${search}"/>
                <button class="btn btn-warning px-4" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </form>
    </div>

    <!-- Category Filters -->
    <div class="mb-4 d-flex flex-wrap gap-2 align-items-center">
        <span class="text-muted fw-semibold me-2">Filter:</span>
        <a th:href="@{/products}" class="btn btn-sm"
           th:classappend="${selectedCategory == null and search == null} ? 'btn-dark' : 'btn-outline-secondary'">
            All
        </a>
        <a th:each="cat : ${categories}"
           th:href="@{/products(category=${cat})}"
           class="btn btn-sm category-badge"
           th:classappend="${selectedCategory == cat} ? 'btn-warning text-dark fw-bold' : 'btn-outline-secondary'"
           th:text="${cat}">Category</a>
    </div>

    <!-- Products Grid -->
    <div th:if="${products.empty}" class="text-center py-5">
        <i class="bi bi-search display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">No products found</h4>
        <a th:href="@{/products}" class="btn btn-warning mt-2">Browse All Products</a>
    </div>

    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
            <div class="card product-card h-100 shadow-sm">
                <a th:href="@{/products/{id}(id=${product.id})}">
                    <img th:src="${product.imageUrl} ?: 'https://via.placeholder.com/400x220?text=' + ${product.name}"
                         th:alt="${product.name}" class="card-img-top"/>
                </a>
                <div class="card-body d-flex flex-column">
                    <span class="badge bg-secondary mb-1 align-self-start" th:text="${product.category}"></span>
                    <h6 class="card-title fw-bold" th:text="${product.name}">Product</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       th:text="${#strings.abbreviate(product.description, 80)}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="price-tag" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 2)}">₹0.00</span>
                        <span class="badge" th:classappend="${product.stock > 0} ? 'bg-success' : 'bg-danger'"
                              th:text="${product.stock > 0} ? 'In Stock' : 'Out of Stock'">Stock</span>
                    </div>
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="btn btn-dark btn-sm mt-3 w-100">
                        <i class="bi bi-eye me-1"></i> View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase. Built with Spring Boot &amp; Thymeleaf.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
