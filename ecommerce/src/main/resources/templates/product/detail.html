<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${product.name} + ' - ShopEase'">Product - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .badge-cart { position: relative; top: -8px; right: 4px; font-size: 0.65rem; }
        .product-img { max-height: 420px; object-fit: cover; border-radius: 12px; width: 100%; }
        .price-tag { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .btn-add-cart { background: #f59e0b; border-color: #f59e0b; color: #000; font-weight: 700; }
        .btn-add-cart:hover { background: #d97706; border-color: #d97706; }
        footer { background: #212529; color: #adb5bd; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="badge bg-warning text-dark badge-cart" th:text="${cartCount} ?: '0'">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/orders}"><i class="bi bi-box-seam me-1"></i>My Orders</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button class="btn btn-sm btn-outline-light ms-2">Logout</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm btn-outline-light me-2" th:href="@{/login}">Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/products}" class="text-warning">Products</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products(category=${product.category})}"
                                           class="text-warning" th:text="${product.category}">Category</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
        </ol>
    </nav>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-5 align-items-start">
        <div class="col-md-5">
            <img th:src="${product.imageUrl} ?: 'https://via.placeholder.com/600x420?text=' + ${product.name}"
                 th:alt="${product.name}" class="product-img shadow"/>
        </div>
        <div class="col-md-7">
            <span class="badge bg-secondary fs-6 mb-2" th:text="${product.category}">Category</span>
            <h1 class="fw-bold mb-3" th:text="${product.name}">Product Name</h1>
            <p class="text-muted mb-4" th:text="${product.description}">Description</p>

            <div class="d-flex align-items-center gap-3 mb-4">
                <span class="price-tag" th:text="'₹' + ${#numbers.formatDecimal(product.price, 1, 2)}">₹0.00</span>
                <span class="badge fs-6"
                      th:classappend="${product.stock > 0} ? 'bg-success' : 'bg-danger'"
                      th:text="${product.stock > 0} ? 'In Stock (' + ${product.stock} + ' left)' : 'Out of Stock'">
                </span>
            </div>

            <!-- Add to Cart -->
            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/add}" method="post" th:if="${product.stock > 0}">
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <div class="d-flex gap-3 align-items-center mb-3">
                        <label class="fw-semibold">Quantity:</label>
                        <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}"
                               class="form-control" style="width: 90px;"/>
                    </div>
                    <button type="submit" class="btn btn-add-cart btn-lg px-5">
                        <i class="bi bi-cart-plus me-2"></i>Add to Cart
                    </button>
                </form>
                <p th:if="${product.stock == 0}" class="text-danger fw-semibold">
                    <i class="bi bi-x-circle me-1"></i>This product is currently unavailable.
                </p>
            </div>

            <div sec:authorize="!isAuthenticated()" class="mt-3">
                <a th:href="@{/login}" class="btn btn-warning btn-lg px-5">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login to Purchase
                </a>
            </div>

            <div class="mt-4 pt-4 border-top">
                <div class="d-flex gap-3 text-muted">
                    <span><i class="bi bi-truck me-1"></i>Free Delivery</span>
                    <span><i class="bi bi-arrow-return-left me-1"></i>Easy Returns</span>
                    <span><i class="bi bi-shield-check me-1"></i>Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/products}" class="btn btn-outline-dark">
            <i class="bi bi-arrow-left me-1"></i>Back to Products
        </a>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase. Built with Spring Boot &amp; Thymeleaf.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
