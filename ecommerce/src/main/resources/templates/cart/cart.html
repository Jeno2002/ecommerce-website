<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Cart - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .badge-cart { position: relative; top: -8px; right: 4px; font-size: 0.65rem; }
        .cart-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .price-tag { color: #f59e0b; font-weight: 700; }
        .summary-card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        footer { background: #212529; color: #adb5bd; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a class="nav-link text-white" th:href="@{/products}"><i class="bi bi-grid me-1"></i>Products</a>
            <a class="nav-link text-white" th:href="@{/orders}"><i class="bi bi-box-seam me-1"></i>Orders</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-cart3 me-2 text-warning"></i>My Cart</h2>

    <div th:if="${cartItems.empty}" class="text-center py-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">Your cart is empty</h4>
        <a th:href="@{/products}" class="btn btn-warning mt-3 px-5">
            <i class="bi bi-arrow-left me-1"></i>Continue Shopping
        </a>
    </div>

    <div th:if="${!cartItems.empty}" class="row g-4">
        <!-- Cart Items -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-0">
                    <div th:each="item, stat : ${cartItems}"
                         th:classappend="${!stat.last} ? 'border-bottom'"
                         class="d-flex align-items-center gap-3 p-3">
                        <img th:src="${item.product.imageUrl} ?: 'https://via.placeholder.com/80'"
                             th:alt="${item.product.name}" class="cart-img"/>
                        <div class="flex-grow-1">
                            <h6 class="mb-0 fw-bold" th:text="${item.product.name}">Name</h6>
                            <small class="text-muted" th:text="${item.product.category}">Cat</small>
                            <div class="price-tag" th:text="'₹' + ${#numbers.formatDecimal(item.product.price, 1, 2)}"></div>
                        </div>
                        <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-flex align-items-center gap-2">
                            <input type="number" name="quantity" th:value="${item.quantity}"
                                   min="1" th:max="${item.product.stock}"
                                   class="form-control form-control-sm" style="width:70px;"
                                   onchange="this.form.submit()"/>
                        </form>
                        <div class="text-end" style="min-width:90px;">
                            <div class="fw-bold" th:text="'₹' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></div>
                            <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post" class="mt-1">
                                <button class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/products}" class="btn btn-outline-dark">
                    <i class="bi bi-arrow-left me-1"></i>Continue Shopping
                </a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-4">
            <div class="card summary-card p-4">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Items (<span th:text="${cartCount}"></span>)</span>
                    <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Delivery</span>
                    <span class="text-success">FREE</span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold fs-5 mb-4">
                    <span>Total</span>
                    <span class="text-warning" th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
                <a th:href="@{/orders/checkout}" class="btn btn-warning btn-lg w-100 fw-bold">
                    <i class="bi bi-lock me-2"></i>Proceed to Checkout
                </a>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
