<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .btn-primary { background: #f59e0b; border-color: #f59e0b; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #d97706; border-color: #d97706; color: #000; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width: 420px;">
    <div class="text-center mb-4">
        <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEase</div>
        <p class="text-white-50">Sign in to your account</p>
    </div>
    <div class="card p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-circle me-1"></i> Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2">
            <i class="bi bi-check-circle me-1"></i> You have been logged out.
        </div>
        <div th:if="${success}" class="alert alert-success py-2">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${success}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>

        <hr/>
        <p class="text-center text-muted mb-0">
            Don't have an account?
            <a th:href="@{/register}" class="text-warning fw-semibold text-decoration-none">Register</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
