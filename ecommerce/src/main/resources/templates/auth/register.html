<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand { font-size: 2rem; font-weight: 800; color: #f59e0b; }
        .btn-primary { background: #f59e0b; border-color: #f59e0b; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #d97706; border-color: #d97706; color: #000; }
        .is-invalid ~ .invalid-feedback { display: block; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container" style="max-width: 460px;">
    <div class="text-center mb-4">
        <div class="brand"><i class="bi bi-bag-heart-fill"></i> ShopEase</div>
        <p class="text-white-50">Create your account</p>
    </div>
    <div class="card p-4">
        <form th:action="@{/register}" th:object="${user}" method="post" novalidate>
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           class="form-control" placeholder="John Doe"/>
                </div>
                <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           class="form-control" placeholder="you@example.com"/>
                </div>
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           class="form-control" placeholder="Min. 6 characters"/>
                </div>
                <div class="invalid-feedback" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-person-plus me-1"></i> Create Account
            </button>
        </form>
        <hr/>
        <p class="text-center text-muted mb-0">
            Already have an account?
            <a th:href="@{/login}" class="text-warning fw-semibold text-decoration-none">Sign In</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
