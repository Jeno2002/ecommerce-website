<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Checkout - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .price-tag { color: #f59e0b; font-weight: 700; }
        .cart-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        footer { background: #212529; color: #adb5bd; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/cart}">
                <i class="bi bi-arrow-left me-1"></i>Back to Cart
            </a>
        </div>
    </div>
</nav>

<div class="container py-5" style="max-width: 900px;">
    <h2 class="fw-bold mb-4"><i class="bi bi-credit-card me-2 text-warning"></i>Checkout</h2>

    <div class="row g-4">
        <!-- Shipping Form -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-3 p-4">
                <h5 class="fw-bold mb-3"><i class="bi bi-geo-alt me-2"></i>Shipping Address</h5>
                <form th:action="@{/orders/place}" method="post" id="checkoutForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" th:value="${user.name}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" th:value="${user.email}" readonly/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Delivery Address *</label>
                        <textarea name="shippingAddress" class="form-control" rows="3"
                                  placeholder="Enter your full delivery address..." required></textarea>
                    </div>

                    <h5 class="fw-bold mb-3 mt-4"><i class="bi bi-credit-card me-2"></i>Payment</h5>
                    <div class="alert alert-info py-2">
                        <i class="bi bi-info-circle me-1"></i>
                        <strong>Cash on Delivery</strong> — Pay when your order arrives.
                    </div>

                    <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold mt-3">
                        <i class="bi bi-bag-check me-2"></i>Place Order
                    </button>
                </form>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-3 p-4">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div th:each="item : ${cartItems}" class="d-flex align-items-center gap-2 mb-2">
                    <img th:src="${item.product.imageUrl} ?: 'https://via.placeholder.com/60'"
                         class="cart-img" th:alt="${item.product.name}"/>
                    <div class="flex-grow-1">
                        <div class="fw-semibold small" th:text="${item.product.name}"></div>
                        <div class="text-muted small" th:text="'Qty: ' + ${item.quantity}"></div>
                    </div>
                    <div class="price-tag small" th:text="'₹' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></div>
                </div>
                <hr/>
                <div class="d-flex justify-content-between mb-1">
                    <span class="text-muted">Subtotal</span>
                    <span th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Delivery</span>
                    <span class="text-success">FREE</span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total</span>
                    <span class="text-warning" th:text="'₹' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
