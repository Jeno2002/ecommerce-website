<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Order #' + ${order.id} + ' - ShopEase'">Order Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .status-badge { font-size: 0.85rem; padding: 6px 14px; border-radius: 20px; font-weight: 600; }
        .status-PENDING   { background: #fef3c7; color: #92400e; }
        .status-CONFIRMED { background: #dbeafe; color: #1e40af; }
        .status-SHIPPED   { background: #ede9fe; color: #5b21b6; }
        .status-DELIVERED { background: #d1fae5; color: #065f46; }
        .status-CANCELLED { background: #fee2e2; color: #991b1b; }
        .item-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        footer { background: #212529; color: #adb5bd; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/orders}">
                <i class="bi bi-arrow-left me-1"></i>My Orders
            </a>
        </div>
    </div>
</nav>

<div class="container py-5" style="max-width: 800px;">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h3 class="fw-bold mb-0">Order #<span th:text="${order.id}"></span></h3>
        <span class="status-badge" th:classappend="'status-' + ${order.status}"
              th:text="${order.status}">Status</span>
    </div>

    <div class="card border-0 shadow-sm rounded-3 p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="text-muted small">Order Date</div>
                <div class="fw-semibold" th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}"></div>
            </div>
            <div class="col-md-6">
                <div class="text-muted small">Shipping Address</div>
                <div class="fw-semibold" th:text="${order.shippingAddress}"></div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3 p-4 mb-4">
        <h5 class="fw-bold mb-3">Items</h5>
        <div th:each="item, stat : ${order.items}"
             th:classappend="${!stat.last} ? 'border-bottom pb-3 mb-3'"
             class="d-flex align-items-center gap-3">
            <img th:src="${item.product.imageUrl} ?: 'https://via.placeholder.com/70'"
                 class="item-img" th:alt="${item.product.name}"/>
            <div class="flex-grow-1">
                <div class="fw-bold" th:text="${item.product.name}"></div>
                <div class="text-muted small">
                    Qty: <span th:text="${item.quantity}"></span> ×
                    ₹<span th:text="${#numbers.formatDecimal(item.priceAtPurchase, 1, 2)}"></span>
                </div>
            </div>
            <div class="fw-bold text-warning"
                 th:text="'₹' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3 p-4">
        <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
        </div>
        <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Delivery</span>
            <span class="text-success">FREE</span>
        </div>
        <hr/>
        <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Total Paid</span>
            <span class="text-warning" th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></span>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/orders}" class="btn btn-outline-dark me-2">
            <i class="bi bi-arrow-left me-1"></i>Back to Orders
        </a>
        <a th:href="@{/products}" class="btn btn-warning">
            <i class="bi bi-bag me-1"></i>Continue Shopping
        </a>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
