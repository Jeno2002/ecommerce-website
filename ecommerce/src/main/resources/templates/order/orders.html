<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Orders - ShopEase</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .badge-cart { position: relative; top: -8px; right: 4px; font-size: 0.65rem; }
        .status-badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; font-weight: 600; }
        .status-PENDING   { background: #fef3c7; color: #92400e; }
        .status-CONFIRMED { background: #dbeafe; color: #1e40af; }
        .status-SHIPPED   { background: #ede9fe; color: #5b21b6; }
        .status-DELIVERED { background: #d1fae5; color: #065f46; }
        .status-CANCELLED { background: #fee2e2; color: #991b1b; }
        .order-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        footer { background: #212529; color: #adb5bd; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand text-warning" th:href="@{/products}">
            <i class="bi bi-bag-heart-fill me-1"></i>ShopEase
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a class="nav-link text-white" th:href="@{/products}">Products</a>
            <a class="nav-link text-white" th:href="@{/cart}">
                <i class="bi bi-cart3 fs-5"></i>
                <span class="badge bg-warning text-dark badge-cart" th:text="${cartCount} ?: '0'">0</span>
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="bi bi-box-seam me-2 text-warning"></i>My Orders</h2>

    <!-- Flash -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${orders.empty}" class="text-center py-5">
        <i class="bi bi-bag-x display-1 text-muted"></i>
        <h4 class="mt-3 text-muted">No orders yet</h4>
        <a th:href="@{/products}" class="btn btn-warning mt-3 px-5">Start Shopping</a>
    </div>

    <div class="d-flex flex-column gap-3" th:if="${!orders.empty}">
        <div class="card order-card p-4" th:each="order : ${orders}">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                <div>
                    <h6 class="fw-bold mb-1">Order #<span th:text="${order.id}"></span></h6>
                    <small class="text-muted"
                           th:text="${#temporals.format(order.orderDate, 'dd MMM yyyy, hh:mm a')}">Date</small>
                </div>
                <div class="text-end">
                    <span class="status-badge" th:classappend="'status-' + ${order.status}"
                          th:text="${order.status}">Status</span>
                    <div class="fw-bold mt-1 text-warning"
                         th:text="'₹' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></div>
                </div>
            </div>
            <hr class="my-2"/>
            <div class="d-flex flex-wrap gap-2 mb-2">
                <span th:each="item : ${order.items}" class="badge bg-light text-dark border"
                      th:text="${item.product.name} + ' x' + ${item.quantity}"></span>
            </div>
            <div class="text-muted small mb-2">
                <i class="bi bi-geo-alt me-1"></i>
                <span th:text="${order.shippingAddress}"></span>
            </div>
            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-dark align-self-start">
                <i class="bi bi-eye me-1"></i>View Details
            </a>
        </div>
    </div>
</div>

<footer class="py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2024 ShopEase.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
